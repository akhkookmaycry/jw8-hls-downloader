name: Download HLS Video
on:
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: 'M3U8 playlist URL to download'
        required: true
        type: string
      output_name:
        description: 'Output filename (e.g., video.mp4)'
        required: false
        default: 'video.mp4'
        type: string
      referer:
        description: 'Referer header URL (optional)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install boto3

      - name: Download HLS Video
        run: |
          python3 scripts/hls-downloader.py \
            "${{ inputs.m3u8_url }}" \
            "${{ inputs.output_name }}" \
            "${{ inputs.referer }}"

      - name: Get file info
        if: always()
        run: |
          echo "=== Download Status ==="
          ls -lh output/ 2>/dev/null || echo "No output directory"

      - name: Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          python3 scripts/upload-r2.py "output/${{ inputs.output_name }}" "${{ inputs.output_name }}"

      - name: Upload Artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.output_name }}
          path: output/${{ inputs.output_name }}
          retention-days: 7
          if-no-files-found: ignore
