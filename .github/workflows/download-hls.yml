name: Download HLS Video
on:
  workflow_dispatch:
    inputs:
      page_url:
        description: 'Page URL with JW8 player (or direct M3U8 URL)'
        required: true
        type: string
      output_name:
        description: 'Output filename (e.g., video.mp4)'
        required: false
        default: 'video.mp4'
        type: string
      referer:
        description: 'Referer URL (optional, auto-detected if empty)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install boto3
          npm install playwright
          npx playwright install chromium

      - name: Extract M3U8 URL from page
        id: extract
        run: |
          echo "=== Extracting M3U8 from page ==="
          PAGE_URL="${{ inputs.page_url }}"
          
          # Auto-detect referer from page URL if not provided
          if [ -z "${{ inputs.referer }}" ]; then
            REFERER="$PAGE_URL"
          else
            REFERER="${{ inputs.referer }}"
          fi
          
          # Extract M3U8 URL
          M3U8_OUTPUT=$(python3 scripts/extract-m3u8.py "$PAGE_URL" "$REFERER")
          echo "$M3U8_OUTPUT"
          
          # Extract M3U8_URL from output
          M3U8_URL=$(echo "$M3U8_OUTPUT" | grep "^M3U8_URL=" | cut -d'=' -f2-)
          
          if [ -z "$M3U8_URL" ]; then
            echo "ERROR: Could not extract M3U8 URL"
            exit 1
          fi
          
          echo "m3u8_url=$M3U8_URL" >> $GITHUB_OUTPUT
          echo "referer=$REFERER" >> $GITHUB_OUTPUT
          echo "Found M3U8: $M3U8_URL"

      - name: Download HLS Video
        run: |
          python3 scripts/hls-downloader.py \
            "${{ steps.extract.outputs.m3u8_url }}" \
            "${{ inputs.output_name }}" \
            "${{ steps.extract.outputs.referer }}"

      - name: Get file info
        if: always()
        run: |
          echo "=== Download Status ==="
          ls -lh output/ 2>/dev/null || echo "No output directory"

      - name: Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python3 scripts/upload-r2.py "output/${{ inputs.output_name }}" "${{ inputs.output_name }}"

      - name: Upload Artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.output_name }}
          path: output/${{ inputs.output_name }}
          retention-days: 7
          if-no-files-found: ignore
