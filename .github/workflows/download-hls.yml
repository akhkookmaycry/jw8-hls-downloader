name: Download HLS Video with Diagnostic Extractor
on:
  workflow_dispatch:
    inputs:
      page_url:
        description: 'Page URL (any site)'
        required: true
        type: string
      output_name:
        description: 'Output filename (e.g., video.mp4)'
        required: false
        default: 'video.mp4'
        type: string
      referer:
        description: 'Referer URL (optional, auto-detected if empty)'
        required: false
        default: ''
        type: string
      use_warp:
        description: 'Use Cloudflare WARP proxy (bypass captchas/geo-restrictions)'
        required: false
        default: false
        type: boolean
      warp_country:
        description: 'Country code for WARP (e.g., NL, US, DE) – leave empty for auto'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start WARP Container (if enabled)
        if: inputs.use_warp == true
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          WARP_ENV=""
          if [ -n "${{ inputs.warp_country }}" ]; then
            WARP_ENV="-e WARP_LOCATION=${{ inputs.warp_country }} -e WARP_SLEEP=5"
            echo "Requesting WARP location: ${{ inputs.warp_country }}"
          fi
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            ${WARP_ENV} \
            caomingjun/warp
          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15
          # Verify WARP
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg curl wget
          pip install boto3 yt-dlp
          npm install playwright @ghostery/adblocker-playwright cross-fetch
          npx playwright install chromium

      - name: Extract video URL (diagnostic)
        id: extract
        run: |
          echo "============================================"
          echo "Starting diagnostic video extraction"
          echo "============================================"
          PAGE_URL="${{ inputs.page_url }}"
          if [ -z "${{ inputs.referer }}" ]; then
            REFERER="$PAGE_URL"
          else
            REFERER="${{ inputs.referer }}"
          fi
          export USE_WARP="${{ inputs.use_warp }}"
          set +e
          OUTPUT=$(python3 scripts/extract-m3u8.py "$PAGE_URL" "$REFERER" 2>&1)
          EXIT=$?
          set -e
          echo "Python exit code: $EXIT"
          echo "Full output:"
          echo "$OUTPUT"
          if [ $EXIT -ne 0 ]; then
            echo "ERROR: Extraction failed – see diagnostics above"
            exit 1
          fi
          VIDEO_URL=$(echo "$OUTPUT" | grep "^VIDEO_URL=" | cut -d'=' -f2-)
          if [ -z "$VIDEO_URL" ]; then
            echo "ERROR: No VIDEO_URL found in output"
            exit 1
          fi
          echo "video_url=$VIDEO_URL" >> $GITHUB_OUTPUT
          echo "referer=$REFERER" >> $GITHUB_OUTPUT
          echo "SUCCESS: Video URL = $VIDEO_URL"

      - name: Download video
        run: |
          mkdir -p output
          export USE_WARP="${{ inputs.use_warp }}"
          if [ "${{ inputs.use_warp }}" = "true" ]; then
            PROXY_OPT="--proxy socks5://127.0.0.1:1080"
          else
            PROXY_OPT=""
          fi
          # Use yt-dlp for HLS or direct MP4; it handles most formats well
          yt-dlp \
            --no-playlist \
            --output "output/${{ inputs.output_name }}" \
            --referer "${{ steps.extract.outputs.referer }}" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            $PROXY_OPT \
            "${{ steps.extract.outputs.video_url }}" || \
          {
            echo "yt-dlp failed, falling back to wget for direct URL..."
            wget -O "output/${{ inputs.output_name }}" \
              --header="Referer: ${{ steps.extract.outputs.referer }}" \
              --user-agent="Mozilla/5.0" \
              "${{ steps.extract.outputs.video_url }}"
          }

      - name: Get file info
        if: always()
        run: ls -lh output/ || echo "No output"

      - name: Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if [ -f "scripts/upload-r2.py" ]; then
            python3 scripts/upload-r2.py "output/${{ inputs.output_name }}" "${{ inputs.output_name }}" || echo "R2 upload skipped"
          else
            echo "No upload script, skipping"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.output_name }}
          path: output/${{ inputs.output_name }}
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop WARP Container
        if: always() && inputs.use_warp == true
        run: |
          docker stop warp || true
          docker rm warp || true