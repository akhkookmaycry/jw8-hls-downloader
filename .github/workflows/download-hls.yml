name: Download HLS Video with yt-dlp
on:
  workflow_dispatch:
    inputs:
      page_url:
        description: 'Page URL (any video site supported by yt-dlp)'
        required: true
        type: string
      output_name:
        description: 'Output filename (e.g., video.mp4)'
        required: false
        default: 'video.mp4'
        type: string
      referer:
        description: 'Referer URL (optional, auto-detected if empty)'
        required: false
        default: ''
        type: string
      use_warp:
        description: 'Use Cloudflare WARP proxy (bypass captchas/geo-restrictions)'
        required: false
        default: false
        type: boolean
      warp_country:
        description: 'Country code for WARP (e.g., NL, US, DE) – leave empty for auto'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Checkout repository (needed for output directory or any scripts)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python (yt-dlp requires Python)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Optional: Start WARP container if requested
      - name: Start WARP Container (if enabled)
        if: inputs.use_warp == true
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          
          # Build environment args for country selection
          WARP_ENV=""
          if [ -n "${{ inputs.warp_country }}" ]; then
            WARP_ENV="-e WARP_LOCATION=${{ inputs.warp_country }} -e WARP_SLEEP=5"
            echo "Requesting WARP location: ${{ inputs.warp_country }}"
          fi
          
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            ${WARP_ENV} \
            caomingjun/warp
          
          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15
          
          # Verify WARP is working
          echo "Checking WARP status..."
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

      # Install yt-dlp and ffmpeg (ffmpeg needed for merging formats)
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install yt-dlp

      # Download video directly from page URL using yt-dlp
      - name: Download video with yt-dlp
        run: |
          mkdir -p output
          # Prepare proxy option if WARP is enabled
          if [ "${{ inputs.use_warp }}" = "true" ]; then
            PROXY_OPT="--proxy socks5://127.0.0.1:1080"
          else
            PROXY_OPT=""
          fi
          
          # Prepare referer option
          if [ -n "${{ inputs.referer }}" ]; then
            REFERER_OPT="--referer ${{ inputs.referer }}"
          else
            REFERER_OPT=""
          fi
          
          # Run yt-dlp:
          # - no-playlist: only single video
          # - output template
          # - user-agent (realistic)
          # - add headers (if needed)
          # - allow following redirects (--allow-u)
          # - use the proxy if set
          yt-dlp \
            --no-playlist \
            --output "output/${{ inputs.output_name }}" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            $REFERER_OPT \
            --allow-u \
            $PROXY_OPT \
            "${{ inputs.page_url }}"

      # Show output file info
      - name: Get file info
        if: always()
        run: ls -lh output/ || echo "No output"

      # Optional: Upload to R2 (if secrets configured)
      - name: Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # If you have an upload script, run it; otherwise skip
          if [ -f "scripts/upload-r2.py" ]; then
            python3 scripts/upload-r2.py "output/${{ inputs.output_name }}" "${{ inputs.output_name }}" || echo "R2 upload skipped"
          else
            echo "No upload script found, skipping R2 upload"
          fi

      # Upload video as a workflow artifact (backup)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.output_name }}
          path: output/${{ inputs.output_name }}
          retention-days: 7
          if-no-files-found: ignore

      # Clean up WARP container if it was started
      - name: Stop WARP Container
        if: always() && inputs.use_warp == true
        run: |
          docker stop warp || true
          docker rm warp || true